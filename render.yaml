databases:
  - name: finsight-db
    plan: free
    databaseName: finsight
    user: finsight_user

services:
  - type: web
    name: finsight-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finsight-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: finsight-ml
          property: url
      - key: CLIENT_URL
        fromService:
          type: static
          name: finsight-client
          property: url
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: REDIS_URL
        value: ""
      - key: PORT
        value: "5000"

  - type: web
    name: finsight-ml
    runtime: python
    plan: free
    buildCommand: cd ml_service && pip install -r requirements.txt
    startCommand: cd ml_service && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: finsight-db
          property: connectionString

  - type: static
    name: finsight-client
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: finsight-server
          property: url
